<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SuperOdds — Resolver</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0b0d10; --s1: #111418; --s2: #181c22; --s3: #1f252e; --b0: #262c38;
    --green: #00f590; --gbg: #032210; --gbr: #0a5c28;
    --red: #ff4d6a; --rbg: #200810; --rbr: #6b1525;
    --blue: #38c9ff; --bbg: #051520; --bbr: #0a3050;
    --amber: #ffc94d; --text: #eaf0ff; --t2: #8892a8; --t3: #4a5068;
    --mono: 'JetBrains Mono', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Outfit', 'Segoe UI', sans-serif; font-size: 14px; overscroll-behavior: none; }

  .header {
    position: sticky; top: 0; z-index: 10;
    background: var(--s1); border-bottom: 1px solid var(--b0);
    padding: 14px 16px 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .header-title { font-size: 15px; font-weight: 700; flex: 1; }
  .header-sub { font-size: 11px; color: var(--t2); margin-top: 2px; }
  .sel-count {
    font-size: 11px; font-family: var(--mono); font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
    background: var(--s3); border: 1px solid var(--b0); color: var(--t2);
    transition: all .2s;
  }
  .sel-count.has-sel { background: var(--s2); border-color: var(--amber); color: var(--amber); }

  .list { padding: 10px 12px 130px; display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: var(--s2); border: 1.5px solid var(--b0); border-radius: 14px;
    padding: 13px 14px; cursor: pointer;
    transition: background .12s, border-color .12s, transform .08s;
    user-select: none; -webkit-user-select: none; position: relative;
  }
  .card:active { transform: scale(.98); }
  .card.sel { border-color: var(--amber); background: #120e02; }
  .card.sel::after {
    content: '✓'; position: absolute; top: 10px; right: 12px;
    color: var(--amber); font-weight: 700; font-size: 15px;
  }

  .card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .card-emoji { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .card-ap { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; padding-right: 20px; }
  .card-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .meta-tag {
    font-size: 11px; font-family: var(--mono); color: var(--t2);
    background: var(--s3); border: 1px solid var(--b0); border-radius: 6px; padding: 2px 8px;
  }
  .meta-odd { font-size: 13px; font-family: var(--mono); font-weight: 700; color: var(--amber); }
  .meta-stake { font-size: 11px; font-family: var(--mono); color: var(--t2); margin-left: auto; }

  .empty { text-align: center; color: var(--t3); padding: 60px 20px; font-size: 15px; line-height: 1.6; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  .footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--s1); border-top: 1px solid var(--b0);
    padding: 10px 12px 14px;
  }
  .footer-label { font-size: 11px; color: var(--t3); text-align: center; margin-bottom: 8px; font-family: var(--mono); }
  .btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .btn {
    padding: 13px 6px; border-radius: 12px; border: none;
    font-size: 14px; font-weight: 700; font-family: 'Outfit', sans-serif;
    cursor: pointer; transition: opacity .15s, transform .1s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn:active { transform: scale(.96); }
  .btn:disabled { opacity: .3; cursor: default; pointer-events: none; }
  .btn-green { background: var(--green); color: #000; }
  .btn-red   { background: var(--red);   color: #fff; }
  .btn-void  { background: var(--blue);  color: #000; }

  .loading { display: flex; justify-content: center; align-items: center; height: 200px; color: var(--t3); gap: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--b0); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; }

  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-10px);
    background: var(--s3); border: 1px solid var(--b0); border-radius: 10px;
    padding: 10px 18px; font-size: 13px; color: var(--text);
    opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; z-index: 100; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="header">
  <div style="flex:1">
    <div class="header-title">⚡ Resolver Apostas</div>
    <div class="header-sub" id="h-sub">carregando...</div>
  </div>
  <div class="sel-count" id="sel-count">0 selecionadas</div>
</div>

<div class="list" id="list">
  <div class="loading"><div class="spinner"></div> carregando...</div>
</div>

<div class="footer">
  <div class="footer-label" id="footer-label">Selecione as apostas para resolver</div>
  <div class="btns">
    <button class="btn btn-green" id="btn-green" disabled onclick="confirmar('GREEN')">🟢 GREEN</button>
    <button class="btn btn-red"   id="btn-red"   disabled onclick="confirmar('RED')">🔴 RED</button>
    <button class="btn btn-void"  id="btn-void"  disabled onclick="confirmar('VOID')">⚪ VOID</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.disableVerticalSwipes?.();

const params = new URLSearchParams(window.location.search);
const TOKEN = params.get('token') || '';

const EMOJI = { 'Futebol':'⚽','Basquete':'🏀','Tênis':'🎾','MMA':'🥊','Vôlei':'🏐','E-sports':'🎮','Outros':'🎲' };

let selected = new Set();
let allBets = [];

function fmt(v) { return 'R$ ' + parseFloat(v).toFixed(2).replace('.',','); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function updateUI() {
  const n = selected.size;
  const cnt = document.getElementById('sel-count');
  cnt.textContent = n === 0 ? '0 selecionadas' : `${n} selecionada${n>1?'s':''}`;
  cnt.className = 'sel-count' + (n > 0 ? ' has-sel' : '');
  const disabled = n === 0;
  ['btn-green','btn-red','btn-void'].forEach(id => document.getElementById(id).disabled = disabled);
  document.getElementById('footer-label').textContent = n === 0
    ? 'Selecione as apostas para resolver'
    : `${n} aposta${n>1?'s':''} selecionada${n>1?'s':''} — escolha o resultado:`;
}

function toggleCard(el, id) {
  if (selected.has(id)) { selected.delete(id); el.classList.remove('sel'); }
  else { selected.add(id); el.classList.add('sel'); }
  updateUI();
}

function renderList(bets) {
  allBets = bets;
  const list = document.getElementById('list');
  if (!bets || bets.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">✅</div>Nenhuma aposta pendente hoje!</div>`;
    document.getElementById('h-sub').textContent = 'nenhuma pendente hoje';
    return;
  }
  document.getElementById('h-sub').textContent = `${bets.length} pendente${bets.length!==1?'s':''} hoje`;
  list.innerHTML = bets.map(b => {
    const emoji = EMOJI[b.esp] || '🎲';
    const stake = b.stake ? fmt(b.stake) : null;
    return `<div class="card" data-id="${b.id}" onclick="toggleCard(this,'${b.id}')">
      <div class="card-top">
        <div class="card-emoji">${emoji}</div>
        <div class="card-ap">${b.ap||'—'}</div>
      </div>
      <div class="card-meta">
        ${b.casa ? `<span class="meta-tag">${b.casa}</span>` : ''}
        <span class="meta-odd">@${b.odd??'—'}</span>
        ${stake ? `<span class="meta-stake">${stake}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function confirmar(resultado) {
  if (selected.size === 0) return;
  ['btn-green','btn-red','btn-void'].forEach(id => document.getElementById(id).disabled = true);
  document.getElementById('footer-label').textContent = 'Salvando...';

  const ids = Array.from(selected);
  try {
    const r = await fetch(`/resolve-multi?token=${TOKEN}&res=${resultado}&ids=${ids.join(',')}`);
    if (!r.ok) throw new Error('Erro ' + r.status);
    const data = await r.json();
    toast(data.msg || '✓ Salvo!');
    setTimeout(() => tg.close(), 1200);
  } catch(e) {
    toast('⚠ Erro ao salvar');
    updateUI();
  }
}

async function load() {
  try {
    const r = await fetch(`/pendentes?token=${TOKEN}`);
    if (!r.ok) throw new Error('Erro ' + r.status);
    renderList(await r.json());
  } catch(e) {
    document.getElementById('list').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Erro ao carregar apostas.<br>Feche e tente novamente.</div>`;
  }
}

load();
</script>
</body>
</html>
